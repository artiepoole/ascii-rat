# demo.yaml — the top-level "demo-ception" demo.
#
# This is the flagship ascii-rat demo: a single recording that shows the whole
# workflow end to end, all inside one cast. When ascii-rat-bard replays this
# script it drives a shell and, on screen, uses ascii-rat itself to:
#
#   1. record a brand-new script with ascii-rat-scribe,
#   2. tweak that script by hand in an editor (nano), and
#   3. replay the edited script with ascii-rat-bard to produce a cast.
#
# In other words, it is a demo of making a demo — a viewer watches ascii-rat
# record, edit, and play back a recording without leaving the top-level cast.
#
# Play it with:
#   ascii-rat-bard --watch demo.yaml
#
# Requirements: `ascii-rat-scribe`, `ascii-rat-bard`, and `nano` must all be on
# PATH at replay time. Build the workspace and put target/release on PATH:
#   cargo build --release
#   export PATH="$PWD/target/release:$PATH"
# If the binaries are not on PATH, replace `ascii-rat-scribe` / `ascii-rat-bard`
# in the actions below with the full path to each binary.
#
# The inner recording is written to inner-demo.yaml / inner-demo.cast next to
# wherever you run this from; both are safe to delete afterwards.

output_file: "demo.cast"
cols: 100
rows: 30
start_delay_ms: 500
end_delay_ms: 800
typing_delay_ms: [40, 90]
pre_nl_delay_ms: 200
post_nl_delay_ms: 500
# Comment: actions require comments to be enabled so they are rendered.
with_comments: true
# Give each scripted keypress (Enter, Ctrl-U, Ctrl-O, Ctrl-X, ...) a moment so
# the editor and child programs keep up on playback.
key_delay: [0.15, 0.25]

actions:
  # ---------------------------------------------------------------------------
  # Act 1 — record a new script with ascii-rat-scribe.
  # ---------------------------------------------------------------------------
  - Marker: "record a new script with the scribe"
  - Comment: "step 1: record a session with ascii-rat-scribe"
  # Launch the recorder on a clean, config-free shell so what we type is all
  # that gets captured into inner-demo.yaml.
  - "ascii-rat-scribe -o inner-demo.yaml --cast inner-demo.cast -- bash --norc --noprofile -i"
  - Enter:
  # Wait for the recorder to spawn its inner shell prompt.
  - Wait: 1.5

  - Comment: "type a throwaway note, then delete it"
  # Type an inline shell comment as a note to the viewer, then wipe it out
  # before running anything — a comment without using the `Comment:` action.
  # Ctrl-U is the terminal "kill line" combo: it clears the whole line before
  # the cursor in one keypress, so there is no need to hold Backspace.
  - "# this is a comment"
  - Wait: 1.0
  - Ctrl-U:
  - Wait: 0.5

  - Comment: "type a command into the recorded shell"
  # Everything typed here is being captured by the scribe.
  - "echo recorded by ascii-rat"
  - Enter:
  - Wait: 1.0
  # Leaving the inner shell ends the recorded command, so the scribe writes
  # inner-demo.yaml and exits.
  - "exit"
  - Enter:
  - Wait: 1.5
  - Comment: "the scribe wrote inner-demo.yaml"

  # ---------------------------------------------------------------------------
  # Act 2 — edit the recorded script by hand in nano.
  # ---------------------------------------------------------------------------
  - Marker: "edit the recorded script in nano"
  - Comment: "step 2: tweak inner-demo.yaml in an editor"
  - "nano inner-demo.yaml"
  - Enter:
  # Let nano draw its full-screen editor.
  - Wait: 2.0

  # Jump to the end of the file and add a Comment action to the recording so the
  # edit is visible. (nano: Alt-/ or Ctrl-End go to end-of-buffer; we use the
  # explicit Ctrl-End nav key.)
  - Ctrl-End:
  - Wait: 0.5
  - "  - Comment: \"edited by hand in nano\""
  - Enter:
  - Wait: 1.0

  # Save the file: Ctrl-O (WriteOut), confirm the filename with Enter.
  - Comment: "save with Ctrl-O"
  - Ctrl-O:
  - Wait: 0.8
  - Enter:
  - Wait: 0.8
  # Exit nano: Ctrl-X.
  - Comment: "quit nano with Ctrl-X"
  - Ctrl-X:
  - Wait: 1.5

  # ---------------------------------------------------------------------------
  # Act 3 — replay the edited script with ascii-rat-bard.
  # ---------------------------------------------------------------------------
  - Marker: "replay the edited script"
  - Comment: "step 3: play inner-demo.yaml back with ascii-rat-bard"
  # Replay the script we just recorded and edited; --watch mirrors it live so
  # the viewer sees the playback happen inside this top-level cast.
  - "ascii-rat-bard --watch inner-demo.yaml"
  - Enter:
  # Let the inner playback run to completion (it types the echo and exits).
  - Wait: 4.0

  - Comment: "demo-ception complete: recorded, edited, and replayed"
  - Wait: 1.0

  # ---------------------------------------------------------------------------
  # Act 4 — show how you *would* share the cast, without actually uploading.
  # ---------------------------------------------------------------------------
  - Marker: "show the asciinema upload command"
  - Comment: "this is how you would upload the cast to asciinema.org"
  # Type the upload command so the viewer sees it, but do NOT press Enter — hit
  # Ctrl-U (kill line) instead to wipe it, so nothing is actually uploaded.
  - "asciinema upload demo.cast"
  - Wait: 1.5
  - Comment: "press Ctrl-U instead of Enter, so it is not actually sent"
  - Ctrl-U:
  - Wait: 1.0

  # Leave the shell that ascii-rat-bard launched us in.
  - "exit"
  - Enter:
  - END_REC:
